<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0A0A0A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="RANGEWORK" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>RANGEWORK</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:#0A0A0A;color:#F0E6D3;font-family:'Outfit',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  body{padding-bottom:env(safe-area-inset-bottom,0)}
  ::-webkit-scrollbar{width:0}
  input{font-family:inherit}
  .tf-fade{animation:tfFade .25s ease}
  @keyframes tfFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .tf-tap:active{transform:scale(.985)}
  button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid #D4A017;outline-offset:2px}
  @media (prefers-reduced-motion: reduce){.tf-fade{animation:none}.tf-tap:active{transform:none}}
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
